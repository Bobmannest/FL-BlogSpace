<!doctype html>
<html>
<head>
    <title>Flaskr</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #333;
            color: white;
            padding: 10px 20px;
        }

        header a {
            color: white;
            margin-right: 10px;
            text-decoration: none;
        }

        .container {
            width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
        }

        .flash {
            background: #ffefc2;
            padding: 10px;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px 0;
        }

        button {
            padding: 8px 12px;
            background: #333;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <a href="/">Home</a>
    {% if g.user %}
        <a href="/create">New Post</a>
        <a href="/auth/logout">Logout</a>
        <span>Logged in as {{ g.user['username'] }}</span>
    {% else %}
        <a href="/auth/login">Login</a>
        <a href="/auth/register">Register</a>
    {% endif %}
</header>

<div class="container">
    {% for message in get_flashed_messages() %}
        <div class="flash">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

</body>
</html>

{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Write a post</h2>
    <form method="post">
        <label>Title</label>
        <input name="title" placeholder="Something interesting...">
        <label>Body</label>
        <textarea name="body" rows="7" placeholder="Write your thoughts..."></textarea>
        <button type="submit">Publish</button>
    </form>
</div>

{% endblock %}

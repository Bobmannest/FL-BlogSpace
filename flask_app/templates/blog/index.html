{% extends "base.html" %}

{% block content %}

<h2>Posts</h2>

{% for post in posts %}
    <div style="border-bottom: 1px solid #ddd; margin-bottom: 15px;">
        <h3>{{ post['title'] }}</h3>
        <small>
            by {{ post['username'] }} | {{ post['created'] }}
        </small>
        <p>{{ post['body'] }}</p>
    </div>
{% else %}
    <p>No posts yet.</p>
{% endfor %}

{% endblock %}
